<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <!-- HEAD ICON -->
    <link
      rel="icon"
      href="./assets/Mateus Silva Icon.png"
      type="image/x-icon"
    />
    <!-- HEAD ICON END -->

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- FONTS END -->

    <title>DevLinks</title>
  </head>
  <body>
    <!-- WEBSITE CONTENT -->
    <div id="container">
      <!-- PROFILE -->
      <div id="profile">
        <img
          src="./assets/avatar.png"
          alt="Foto de Mateus Silva sério, usando óculos e camisa cinza, bigode e fundo branco."
          alt="Foto de Mateus Silva sério, usando óculos e camisa cinza, bigode e fundo rosa claro."
        />
        <p>@mateuslas</p>
      </div>
      <!-- PROFILE END -->

      <!-- THEME SWITCH BUTTON -->
      <div id="switch">
        <button onclick="toggleMode()"></button>
        <span></span>
      </div>
      <!-- THEME SWITCH BUTTON END -->

      <!-- BAR-SHAPED LINKS -->
      <ul>
        <li>
          <a href="https://teuzinfotografia.netlify.app/" target="_blank"
            >Meu site de fotografia</a
          >
        </li>

        <li>
          <a href="https://github.com/mateuzito" target="_blank"
            >Veja meu portfólio</a
          >
        </li>
      </ul>
      <!-- BAR-SHAPED LINKS END -->

      <!-- LINKS IN ICONS -->
      <div id="social-links">
        <a href="https://github.com/mateuzito" target="_blank">
          <ion-icon name="logo-github"></ion-icon>
        </a>

        <a href="https://instagram.com/mateuslas" target="_blank">
          <ion-icon name="logo-instagram"></ion-icon>
        </a>

        <a href="https://youtube.com/@MateusGmmr" target="_blank">
          <ion-icon name="logo-youtube"></ion-icon>
        </a>

        <a href="https://linkedin.com/in/mateuslas" target="_blank">
          <ion-icon name="logo-linkedin"></ion-icon>
        </a>
      </div>
      <!-- LINKS IN ICONS END -->
    </div>
    <!-- WEBSITE CONTENT END -->

    <!-- ICON CODE -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <!-- ICON CODE END -->

    <script src="script.js"></script>
  </body>
</html>
